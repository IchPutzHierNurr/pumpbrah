<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0c">
    <title>PUMPBRAH</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
        input,textarea,select{-webkit-user-select:text;user-select:text}
        :root{--bg:#0a0a0c;--bg2:#111116;--bg3:#1a1a22;--bg4:#22222e;--bg5:#2a2a38;--neon:#c8ff00;--neon2:#a8e600;--nd:rgba(200,255,0,.15);--red:#ff3b5c;--orange:#ff8c42;--blue:#4ecaff;--purple:#b47eff;--green:#34d399;--text:#f0f0f4;--text2:#8888a0;--text3:#55556a;--radius:14px}
        html,body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;overflow-x:hidden;height:100%;-webkit-font-smoothing:antialiased}
        .app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
        .screen{display:none;padding:0 16px 110px;animation:fu .25s ease}.screen.active{display:block}
        @keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
        .hdr{padding:max(env(safe-area-inset-top),12px) 0 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:linear-gradient(var(--bg) 70%,transparent)}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--neon);text-shadow:0 0 20px rgba(200,255,0,.25)}
        .pill{background:var(--bg3);border:1px solid var(--bg4);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--neon);font-weight:600;display:flex;align-items:center;gap:5px}
        .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--neon);animation:pu 2s infinite}
        .pill.offline .dot{background:var(--red)}.pill.offline{color:var(--red)}
        @keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
        .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,12,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bg3);display:flex;padding:6px 0 max(env(safe-area-inset-bottom),6px);z-index:100}
        .ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer}
        .ni svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:1.8;transition:.2s}
        .ni .nl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);transition:.2s}
        .ni.on svg{stroke:var(--neon);filter:drop-shadow(0 0 6px rgba(200,255,0,.4))}.ni.on .nl{color:var(--neon)}
        .card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:16px;margin-bottom:10px;position:relative;overflow:hidden}
        .st{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--text2);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
        .st .ln{flex:1;height:1px;background:var(--bg3)}
        .hero{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
        .hs{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:10px 8px;text-align:center}
        .hs .v{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--neon);line-height:1}
        .hs .l{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
        .btn{display:block;padding:12px;background:var(--neon);color:var(--bg);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;text-align:center;border-radius:10px;border:none;width:100%;cursor:pointer;transition:.15s;margin-top:10px}
        .btn:active{transform:scale(.97);opacity:.85}
        .btn-s{padding:8px 16px;font-size:14px;width:auto;display:inline-block;margin-top:0}
        .btn-r{background:var(--red);color:white}
        .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
        .login-input{width:100%;max-width:300px;padding:14px;background:var(--bg3);border:2px solid var(--bg4);border-radius:12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:18px;text-align:center;outline:none;margin-bottom:12px}
        .mbg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
        .mbg.show{display:flex}
        .mdl{background:var(--bg2);border-top:1px solid var(--bg3);border-radius:16px 16px 0 0;width:100%;max-width:430px;padding:20px 16px max(env(safe-area-inset-bottom),16px);animation:su .25s ease}
        @keyframes su{from{transform:translateY(100%)}to{transform:none}}
        .empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
    </style>
</head>
<body>

<div class="app">
    <div id="login-screen" class="login-screen">
        <div class="logo" style="font-size:48px; margin-bottom:10px;">PUMPBRAH</div>
        <p style="color:var(--text2); margin-bottom:30px;">Cloud Sync für dein Training</p>
        <input class="login-input" id="sync-code" placeholder="DEIN NAME / CODE" autocapitalize="none">
        <button class="btn" style="width:300px" onclick="doLogin()">▶ STARTEN</button>
    </div>

    <div id="main-app" style="display:none">
        <nav class="bnav">
            <div class="ni on" onclick="go('dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><span class="nl">Home</span></div>
            <div class="ni" onclick="go('wo')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg><span class="nl">Workout</span></div>
            <div class="ni" onclick="go('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span class="nl">Setup</span></div>
        </nav>

        <div class="screen active" id="s-dash">
            <div class="hdr"><div class="logo">PUMPBRAH</div><div class="pill" id="sync-pill"><div class="dot"></div><span id="sync-status">Synced</span></div></div>
            <div class="hero">
                <div class="hs"><div class="v" id="d-sets">0</div><div class="l">Sätze</div></div>
                <div class="hs"><div class="v" id="d-sess">0</div><div class="l">Sessions</div></div>
                <div class="hs"><div class="v">7</div><div class="l">Streak 🔥</div></div>
            </div>
            <div class="st">NÄCHSTES WORKOUT <div class="ln"></div></div>
            <div id="d-next" class="card">Kein Plan aktiv.</div>
        </div>

        <div class="screen" id="s-wo">
            <div class="hdr"><div class="logo">WORKOUT</div><button class="btn btn-s btn-r" id="wo-end" style="display:none" onclick="endWorkout()">BEENDEN</button></div>
            <div id="wo-c"></div>
        </div>

        <div class="screen" id="s-settings">
            <div class="hdr"><div class="logo">SETUP</div></div>
            <div class="card">
                <p style="font-size:12px; color:var(--text2);">Sync-Code: <b id="show-sync" style="color:var(--neon)"></b></p>
                <button class="btn btn-r" onclick="doLogout()">Logout / Code wechseln</button>
            </div>
        </div>
    </div>
</div>

<div class="mbg" id="m-pick"><div class="mdl">
    <div class="logo" style="font-size:20px; margin-bottom:15px;">WORKOUT WÄHLEN</div>
    <div id="pick-list"></div>
    <button class="btn btn-r" style="margin-top:10px;" onclick="cm('m-pick')">ABBRECHEN</button>
</div></div>

<script>
// --- CONFIG ---
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCaWvytYF7RnkX8ouIlsDiBRy0MP4pZW-g",
  authDomain: "pumpbrah-9e21e.firebaseapp.com",
  projectId: "pumpbrah-9e21e",
  storageBucket: "pumpbrah-9e21e.firebasestorage.app",
  messagingSenderId: "190452878389",
  appId: "1:190452878389:web:eac735f8031f68eb8df57c"
};

// --- STATE ---
let db = null;
let syncCode = localStorage.getItem('pb_sync') || '';
let D = { history: [], active: null, plan: {"Push": {day:"Mo", ex:[]}, "Pull": {day:"Mi", ex:[]}} };

// --- CORE ---
function initFirebase() {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
}

function save() {
    localStorage.setItem('pb_data', JSON.stringify(D));
    if (db && syncCode) {
        db.collection('pumpbrah').doc(syncCode).set(D).catch(console.error);
    }
}

function load() {
    const local = localStorage.getItem('pb_data');
    if (local) D = JSON.parse(local);
    if (db && syncCode) {
        db.collection('pumpbrah').doc(syncCode).onSnapshot(doc => {
            if (doc.exists) {
                D = doc.data();
                renderAll();
            }
        });
    }
}

// --- UI NAVIGATION ---
function go(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('s-' + id).classList.add('active');
    document.querySelectorAll('.ni').forEach((n, i) => {
        n.classList.toggle('on', ['dash', 'wo', 'settings'][i] === id);
    });
    renderAll();
}

function cm(id) { document.getElementById(id).classList.remove('show'); }
function om(id) { document.getElementById(id).classList.add('show'); }

// --- ACTIONS ---
function doLogin() {
    const val = document.getElementById('sync-code').value.trim().toLowerCase();
    if (!val) return alert("Bitte Code eingeben");
    syncCode = val;
    localStorage.setItem('pb_sync', syncCode);
    initFirebase();
    load();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('show-sync').textContent = syncCode;
    go('dash');
}

function doLogout() {
    localStorage.removeItem('pb_sync');
    location.reload();
}

function renderAll() {
    // Dash
    document.getElementById('d-sets').textContent = D.history.reduce((a, b) => a + (b.sets ? b.sets.length : 0), 0);
    document.getElementById('d-sess').textContent = D.history.length;
    
    // Workout
    const woC = document.getElementById('wo-c');
    const endBtn = document.getElementById('wo-end');
    if (!D.active) {
        woC.innerHTML = '<div class="empty">Kein Workout aktiv.<br><br><button class="btn" onclick="startWorkout()">▶ STARTEN</button></div>';
        endBtn.style.display = 'none';
    } else {
        woC.innerHTML = `<div class="card"><h2 style="color:var(--neon)">${D.active.name}</h2><p>Training läuft...</p></div>`;
        endBtn.style.display = 'block';
    }
}

function startWorkout() {
    const list = document.getElementById('pick-list');
    list.innerHTML = '';
    Object.keys(D.plan).forEach(p => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.textContent = p;
        b.onclick = () => {
            D.active = { name: p, start: Date.now(), sets: [] };
            save();
            cm('m-pick');
            go('wo');
        };
        list.appendChild(b);
    });
    om('m-pick');
}

function endWorkout() {
    if (confirm("Workout beenden?")) {
        D.history.push({...D.active, end: Date.now()});
        D.active = null;
        save();
        go('dash');
    }
}

// AUTO-INIT
if (syncCode) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('show-sync').textContent = syncCode;
    initFirebase();
    load();
    renderAll();
}
</script>
</body>
</html>
