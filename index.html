<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0c">
<title>PUMPBRAH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;user-select:text}
:root{
--bg:#0a0a0c;--bg2:#111116;--bg3:#1a1a22;--bg4:#22222e;--bg5:#2a2a38;
--neon:#c8ff00;--neon2:#a8e600;--neon-dim:rgba(200,255,0,.15);
--red:#ff3b5c;--orange:#ff8c42;--blue:#4ecaff;--purple:#b47eff;--green:#34d399;
--text:#f0f0f4;--text2:#8888a0;--text3:#55556a;
--radius:14px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;overflow-x:hidden;height:100%;-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}

/* SCREENS */
.screen{display:none;padding:0 16px 110px;animation:fadeUp .25s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* HEADER */
.hdr{padding:max(env(safe-area-inset-top),12px) 0 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:linear-gradient(var(--bg) 70%,transparent)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--neon);text-shadow:0 0 20px rgba(200,255,0,.25)}
.hdr-pill{background:var(--bg3);border:1px solid var(--bg4);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--neon);font-weight:600;display:flex;align-items:center;gap:5px}
.hdr-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--neon);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 4px var(--neon)}50%{opacity:.3}}

/* NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,12,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bg3);display:flex;padding:6px 0 max(env(safe-area-inset-bottom),6px);z-index:100}
.bnav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer}
.bnav-i svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:1.8;transition:.2s}
.bnav-i .bl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);transition:.2s}
.bnav-i.on svg{stroke:var(--neon);filter:drop-shadow(0 0 6px rgba(200,255,0,.4))}
.bnav-i.on .bl{color:var(--neon)}

/* CARDS & SECTIONS */
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:16px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(200,255,0,.15),transparent)}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--text2);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.stitle .ln{flex:1;height:1px;background:var(--bg3)}

/* HERO */
.hero{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.hero-s{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:10px 8px;text-align:center}
.hero-s .v{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--neon);line-height:1}
.hero-s .l{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:3px}

/* NEXT WORKOUT CARD */
.nw-card{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--bg4);border-radius:var(--radius);padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.nw-card::after{content:'';position:absolute;top:-40%;right:-20%;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(200,255,0,.06),transparent);pointer-events:none}
.nw-sub{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:4px}
.nw-name{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--neon)}
.nw-info{font-size:12px;color:var(--text2);margin-top:4px}
.btn{display:block;padding:12px;background:var(--neon);color:var(--bg);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;text-align:center;border-radius:10px;border:none;width:100%;cursor:pointer;transition:.15s;margin-top:12px}
.btn:active{transform:scale(.97);opacity:.85}
.btn-outline{background:transparent;border:1.5px solid var(--neon);color:var(--neon)}
.btn-sm{padding:8px 16px;font-size:14px;width:auto;display:inline-block}
.btn-red{background:var(--red)}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--bg4)}

/* DAY TABS */
.dtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.dtabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;background:var(--bg2);border:1px solid var(--bg3);color:var(--text2);cursor:pointer;transition:.2s;white-space:nowrap}
.dtab.on{background:rgba(200,255,0,.1);border-color:rgba(200,255,0,.2);color:var(--neon)}
.dtab .dn{font-size:10px;display:block;color:var(--text3);margin-top:1px}

/* EXERCISE ROW */
.exr{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:.2s}
.exr.pre{border-color:rgba(255,140,66,.12)}
.exr.mob{border-color:rgba(78,202,255,.12)}
.exr-h{display:flex;align-items:center;gap:10px;padding:12px;cursor:pointer}
.exr-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exr-ico.c-chest{background:rgba(200,255,0,.1)}.exr-ico.c-back{background:rgba(78,202,255,.1)}.exr-ico.c-legs{background:rgba(180,126,255,.08)}.exr-ico.c-shoulders{background:rgba(255,140,66,.1)}.exr-ico.c-arms{background:rgba(255,59,92,.1)}.exr-ico.c-pre{background:rgba(255,140,66,.08)}.exr-ico.c-mob{background:rgba(78,202,255,.08)}
.exr-body{flex:1;min-width:0}
.exr-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exr-meta{font-size:11px;color:var(--text2);margin-top:1px;display:flex;gap:6px;align-items:center}
.rir-badge{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--neon-dim);color:var(--neon);font-weight:600}
.exr-arr{color:var(--text3);font-size:16px;transition:transform .2s}
.exr.open .exr-arr{transform:rotate(180deg)}
.exr-det{display:none;padding:0 12px 12px}
.exr.open .exr-det{display:block;animation:fadeUp .2s ease}
.exr-note{font-size:12px;color:var(--text2);background:var(--bg3);border-radius:8px;padding:8px 10px;line-height:1.5;border-left:2px solid var(--neon);margin-bottom:6px}
.exr-note.pre-n{border-left-color:var(--orange)}.exr-note.mob-n{border-left-color:var(--blue)}
.exr-last{font-size:11px;color:var(--text2);margin-top:4px}
.exr-last b{color:var(--text);font-family:'JetBrains Mono',monospace}

/* ACTIVE WORKOUT */
.wo-header{text-align:center;padding:12px 0 16px}
.wo-plan{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--neon);letter-spacing:2px}
.wo-time{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text2);margin-top:4px}
.wo-ex-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.wo-ex-name{font-weight:700;font-size:16px;margin-bottom:4px}
.wo-ex-target{font-size:12px;color:var(--text2);margin-bottom:12px}
.wo-sets-log{margin-bottom:12px}
.wo-set-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg3);font-size:13px}
.wo-set-row:last-child{border:none}
.wo-set-num{width:28px;height:28px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);font-weight:600;flex-shrink:0}
.wo-set-num.done{background:var(--neon-dim);color:var(--neon)}
.wo-set-vals{flex:1;font-family:'JetBrains Mono',monospace;color:var(--text)}
.wo-set-rir{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.r0{background:rgba(255,59,92,.15);color:var(--red)}.r1{background:rgba(255,140,66,.15);color:var(--orange)}.r2{background:rgba(200,255,0,.1);color:var(--neon)}.r3{background:rgba(78,202,255,.1);color:var(--blue)}

/* INPUT ROW */
.inp-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.inp-grp{flex:1}
.inp-grp label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:3px}
.inp-grp input{width:100%;padding:10px;background:var(--bg3);border:1.5px solid var(--bg4);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;text-align:center;outline:none;transition:.2s}
.inp-grp input:focus{border-color:var(--neon);box-shadow:0 0 10px rgba(200,255,0,.1)}
.inp-grp input::placeholder{color:var(--text3)}

/* TIMER */
.timer-wrap{text-align:center;padding:20px 0}
.timer-circle{width:140px;height:140px;border-radius:50%;border:3px solid var(--bg4);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;position:relative}
.timer-circle.running{border-color:var(--neon);box-shadow:0 0 30px rgba(200,255,0,.15)}
.timer-circle.done{border-color:var(--green);box-shadow:0 0 30px rgba(52,211,153,.15)}
.timer-val{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;color:var(--text)}
.timer-circle.running .timer-val{color:var(--neon)}
.timer-circle.done .timer-val{color:var(--green)}
.timer-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.timer-btns{display:flex;gap:8px;justify-content:center;margin-top:12px}
.timer-btn{padding:8px 20px;border-radius:8px;border:none;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;cursor:pointer}
.timer-start{background:var(--neon);color:var(--bg)}
.timer-skip{background:var(--bg3);color:var(--text);border:1px solid var(--bg4)}
.timer-adj{display:flex;gap:10px;justify-content:center;margin-top:8px;font-size:12px;color:var(--text2)}
.timer-adj span{cursor:pointer;padding:4px 10px;background:var(--bg3);border-radius:6px}

/* HISTORY */
.hist-session{margin-bottom:20px}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.hist-date{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px}
.hist-tag{font-size:11px;padding:3px 10px;border-radius:6px;background:var(--neon-dim);color:var(--neon);font-weight:600}
.hist-row{display:flex;align-items:center;padding:8px 10px;background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;margin-bottom:3px;gap:8px;font-size:12px}
.hist-row .sn{width:24px;height:24px;border-radius:5px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text2);font-weight:600;flex-shrink:0}
.hist-row .se{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.hist-row .sw{font-family:'JetBrains Mono',monospace;color:var(--neon);font-weight:600;font-size:12px;white-space:nowrap}
.hist-row .sr{font-family:'JetBrains Mono',monospace;font-size:12px;white-space:nowrap}

/* PROGRESS CHART */
.prog{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:14px;margin-bottom:10px}
.prog-hd{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;margin-bottom:8px}
.prog-hd span{color:var(--text2);font-size:11px;font-weight:400}
.bars{display:flex;align-items:end;gap:3px;height:50px}
.bar{flex:1;border-radius:3px 3px 0 0;min-width:10px;transition:height .5s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative}
.bar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);font-size:9px;color:var(--neon);white-space:nowrap;background:var(--bg);padding:2px 4px;border-radius:3px;z-index:5}

/* PLAN EDITOR */
.ed-row{display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;margin-bottom:6px}
.ed-row .ed-handle{color:var(--text3);font-size:16px;cursor:grab;flex-shrink:0}
.ed-row .ed-info{flex:1;min-width:0}
.ed-row .ed-name{font-weight:600;font-size:13px}
.ed-row .ed-sets{font-size:11px;color:var(--text2)}
.ed-del{width:30px;height:30px;border-radius:6px;background:rgba(255,59,92,.1);border:none;color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* MODAL */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border-top:1px solid var(--bg3);border-radius:16px 16px 0 0;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;padding:20px 16px max(env(safe-area-inset-bottom),16px);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal-close{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* TOAST */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--bg3);border:1px solid var(--bg4);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--neon);z-index:300;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* DATA MGMT */
.data-btns{display:flex;gap:8px;flex-wrap:wrap}

/* MISC */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.sep{height:1px;background:var(--bg3);margin:12px 0}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
</style>
</head>
<body>
<div class="app">
<div id="toast" class="toast"></div>

<!-- NAV -->
<nav class="bnav">
<div class="bnav-i on" onclick="go('dash')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="bl">Home</span></div>
<div class="bnav-i" onclick="go('wo')"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg><span class="bl">Workout</span></div>
<div class="bnav-i" onclick="go('plan')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="bl">Plan</span></div>
<div class="bnav-i" onclick="go('hist')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="bl">History</span></div>
<div class="bnav-i" onclick="go('settings')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span class="bl">Setup</span></div>
</nav>

<!-- ========== DASHBOARD ========== -->
<div class="screen active" id="s-dash">
<div class="hdr"><div class="logo">PUMPBRAH</div><div class="hdr-pill"><div class="dot"></div><span id="d-phase">—</span></div></div>
<div class="hero"><div class="hero-s"><div class="v" id="d-sets">0</div><div class="l">Sätze</div></div><div class="hero-s"><div class="v" id="d-sess">0</div><div class="l">Sessions</div></div><div class="hero-s"><div class="v" id="d-week">—</div><div class="l">Woche</div></div></div>
<div class="stitle">NÄCHSTES WORKOUT <div class="ln"></div></div>
<div class="nw-card" id="d-next"></div>
<div class="stitle">PROGRESSION <div class="ln"></div></div>
<div id="d-prog"></div>
</div>

<!-- ========== ACTIVE WORKOUT ========== -->
<div class="screen" id="s-wo">
<div class="hdr"><div class="logo">WORKOUT</div><button class="btn btn-sm btn-red" id="wo-end-btn" style="display:none" onclick="endWorkout()">BEENDEN</button></div>
<div id="wo-content"><div class="empty">Kein aktives Workout.<br><br><button class="btn" onclick="startWorkout()">▶ WORKOUT STARTEN</button></div></div>
</div>

<!-- ========== PLAN ========== -->
<div class="screen" id="s-plan">
<div class="hdr"><div class="logo">PLAN</div><button class="btn btn-sm btn-outline" onclick="openAddExercise()">+ ÜBUNG</button></div>
<div class="dtabs" id="plan-tabs"></div>
<div id="plan-list"></div>
</div>

<!-- ========== HISTORY ========== -->
<div class="screen" id="s-hist">
<div class="hdr"><div class="logo">HISTORY</div><div class="hdr-pill" id="h-count">0</div></div>
<div id="hist-list"></div>
</div>

<!-- ========== SETTINGS ========== -->
<div class="screen" id="s-settings">
<div class="hdr"><div class="logo">SETUP</div></div>
<div class="stitle">TIMER <div class="ln"></div></div>
<div class="card">
<div class="inp-row"><div class="inp-grp"><label>Pause Compound (Sek)</label><input type="number" id="set-compound" value="150" onchange="saveSetting('compound',this.value)"></div><div class="inp-grp"><label>Pause Isolation (Sek)</label><input type="number" id="set-isolation" value="90" onchange="saveSetting('isolation',this.value)"></div></div>
</div>
<div class="stitle">DATEN <div class="ln"></div></div>
<div class="card">
<div class="data-btns">
<button class="btn btn-sm btn-ghost" onclick="exportData()">📤 Export JSON</button>
<button class="btn btn-sm btn-ghost" onclick="document.getElementById('imp-file').click()">📥 Import JSON</button>
<input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
</div>
<div class="sep"></div>
<button class="btn btn-sm btn-red" onclick="if(confirm('Alle Daten löschen?')){localStorage.clear();location.reload()}">🗑️ RESET</button>
</div>
</div>

<!-- ========== MODALS ========== -->
<div class="modal-bg" id="modal-log">
<div class="modal">
<div class="modal-title">SATZ LOGGEN <button class="modal-close" onclick="closeModal('modal-log')">✕</button></div>
<div id="log-ex-name" style="font-size:14px;color:var(--text2);margin-bottom:12px"></div>
<div class="inp-row">
<div class="inp-grp"><label>Gewicht (kg)</label><input type="number" step="0.5" id="log-w" placeholder="0"></div>
<div class="inp-grp"><label>Wdh</label><input type="number" id="log-r" placeholder="0"></div>
<div class="inp-grp"><label>RIR</label><input type="number" min="0" max="5" id="log-rir" placeholder="2"></div>
</div>
<div class="inp-row"><div class="inp-grp"><label>Notiz (optional)</label><input type="text" id="log-note" placeholder="z.B. Progression"></div></div>
<button class="btn" onclick="confirmLog()">✓ SATZ SPEICHERN</button>
</div>
</div>

<script>
// ===== STORAGE =====

// ===== DEFAULT DATA =====
const DEFAULT_PLAN = {

]}
};

// ===== STATE =====
let plan = LS.get('plan', null);
if(!plan){plan={...DEFAULT_PLAN};LS.set('plan',plan)}
let history = LS.get('history', []);
let active = LS.get('active', null); // {planKey,startTime,exercises:[{name,sets,rmin,rmax,rir,note,type,muscle,logged:[{w,r,rir,note}]}]}
let settings = LS.get('settings', {compound:150,isolation:90});
let currentPlanTab = Object.keys(plan)[0];
let timerInterval = null;
let timerSeconds = 0;
let timerTarget = 0;
let logTarget = null; // {exIdx}

const EMO = {chest:'🫁',back:'🔙',legs:'🦵',shoulders:'🏔️',arms:'💪'};

// ===== NAVIGATION =====
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  document.querySelectorAll('.bnav-i').forEach((n,i)=>n.classList.toggle('on',['dash','wo','plan','hist','settings'][i]===id));
  window.scrollTo(0,0);
  if(id==='dash')renderDash();
  if(id==='wo')renderWorkout();
  if(id==='plan')renderPlan();
  if(id==='hist')renderHist();
  if(id==='settings')renderSettings();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function closeModal(id){document.getElementById(id).classList.remove('show')}
function openModal(id){document.getElementById(id).classList.add('show')}

// ===== DASHBOARD =====
function renderDash(){
  const totalSets = history.reduce((a,s)=>a+s.sets.length,0);
  document.getElementById('d-sets').textContent = totalSets;
  document.getElementById('d-sess').textContent = history.length;
  document.getElementById('d-week').textContent = 'W'+Math.max(1,Math.ceil((Date.now()-new Date('2026-03-09').getTime())/(7*864e5)));
  document.getElementById('d-phase').textContent = 'Akkumulation';

  // Next workout
  const days=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const fullDays=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const sched={2:'FullBody_A',3:'Mobility_B',4:'FullBody_B',6:'FullBody_A'};
  const td=new Date().getDay();
  let nwKey=null,nwOff=0;
  for(let i=0;i<7;i++){const d=(td+i)%7;if(sched[d]&&plan[sched[d]]){nwKey=sched[d];nwOff=i;break;}}
  if(!nwKey)nwKey=Object.keys(plan)[0];
  const p=plan[nwKey];
  const label=nwOff===0?'Heute — '+fullDays[td]:nwOff===1?'Morgen — '+fullDays[(td+1)%7]:fullDays[(td+nwOff)%7];
  const exNames=p?p.exercises.filter(e=>e.type==='main').map(e=>e.name.split(' ')[0]).join(' • '):'';
  const exCount=p?p.exercises.length:0;
  document.getElementById('d-next').innerHTML=`
    <div class="nw-sub">${label}</div>
    <div class="nw-name">${nwKey.replace('_',' ')}</div>
    <div class="nw-info">${exNames}</div>
    <div style="display:flex;gap:14px;margin-top:8px;font-size:12px;color:var(--text2)"><span>📊 ${exCount} Übungen</span><span>🎯 RIR 2–3</span></div>
    <button class="btn" onclick="startWorkout('${nwKey}')">▶ WORKOUT STARTEN</button>`;

  // Progression charts
  const progDiv=document.getElementById('d-prog');
  const exMap={};
  history.forEach(s=>s.sets.forEach(set=>{if(!exMap[set.ex])exMap[set.ex]=[];exMap[set.ex].push({w:set.w,r:set.r,d:s.date})}));
  let progHtml='';
  const topEx=Object.entries(exMap).filter(([k,v])=>v.length>=2).sort((a,b)=>b[1].length-a[1].length).slice(0,4);
  if(topEx.length===0){progHtml='<div class="empty">Noch keine Progression — log dein erstes Workout!</div>';}
  topEx.forEach(([name,data])=>{
    const maxW=Math.max(...data.map(d=>d.w||1));
    const minW=Math.min(...data.map(d=>d.w));
    progHtml+=`<div class="prog"><div class="prog-hd">${name} <span>${minW}→${maxW} kg</span></div><div class="bars">${data.map(d=>`<div class="bar" style="height:${Math.max(10,(d.w/maxW)*100)}%;background:var(--neon)" data-tip="${d.w}kg×${d.r}"></div>`).join('')}</div></div>`;
  });
  progDiv.innerHTML=progHtml;
}

// ===== PLAN =====
function renderPlan(){
  const tabs=document.getElementById('plan-tabs');
  tabs.innerHTML='';
  Object.entries(plan).forEach(([key,val])=>{
    const d=document.createElement('div');
    d.className='dtab'+(key===currentPlanTab?' on':'');
    d.innerHTML=key.replace('_',' ')+`<span class="dn">${val.day||''}</span>`;
    d.onclick=()=>{currentPlanTab=key;renderPlan()};
    tabs.appendChild(d);
  });
  renderPlanList();
}

function renderPlanList(){
  const c=document.getElementById('plan-list');
  const p=plan[currentPlanTab];
  if(!p||!p.exercises.length){c.innerHTML='<div class="empty">Keine Übungen. Füge eine hinzu!</div>';return;}
  let html='';
  p.exercises.forEach((ex,i)=>{
    const ico=ex.type==='pre'?'🔥':ex.type==='mob'?'🧘':EMO[ex.muscle]||'💪';
    const icoC=ex.type==='pre'?'c-pre':ex.type==='mob'?'c-mob':'c-'+ex.muscle;
    const cardC=ex.type==='pre'?'pre':ex.type==='mob'?'mob':'';
    const noteC=ex.type==='pre'?'pre-n':ex.type==='mob'?'mob-n':'';
    const reps=ex.rmin===ex.rmax?ex.rmin:ex.rmin+'–'+ex.rmax;
    const last=getLastWeight(ex.name);
    html+=`<div class="exr ${cardC}" onclick="this.classList.toggle('open')">
      <div class="exr-h">
        <div class="exr-ico ${icoC}">${ico}</div>
        <div class="exr-body"><div class="exr-name">${ex.name}</div><div class="exr-meta">${ex.sets}×${reps} ${ex.rir!==null?`<span class="rir-badge">RIR ${ex.rir}</span>`:''}</div></div>
        <div class="exr-arr">▾</div>
      </div>
      <div class="exr-det">
        ${ex.note?`<div class="exr-note ${noteC}">${ex.note}</div>`:''}
        ${last?`<div class="exr-last">📊 Letztes Mal: <b>${last}</b></div>`:''}
        <div style="display:flex;gap:6px;margin-top:8px">
          <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();editExercise('${currentPlanTab}',${i})">✏️ Edit</button>
          <button class="btn btn-sm" style="background:var(--red)" onclick="event.stopPropagation();deleteExercise('${currentPlanTab}',${i})">🗑️</button>
          ${i>0?`<button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();moveEx('${currentPlanTab}',${i},-1)">↑</button>`:''}
          ${i<p.exercises.length-1?`<button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();moveEx('${currentPlanTab}',${i},1)">↓</button>`:''}
        </div>
      </div>
    </div>`;
  });
  c.innerHTML=html;
}

function getLastWeight(exName){
  for(let i=history.length-1;i>=0;i--){
    const found=history[i].sets.filter(s=>s.ex===exName&&s.w>0);
    if(found.length){const l=found[found.length-1];return l.w+'kg × '+l.r;}
  }
  return null;
}

function deleteExercise(pk,idx){
  if(!confirm('Übung löschen?'))return;
  plan[pk].exercises.splice(idx,1);
  LS.set('plan',plan);renderPlanList();toast('Gelöscht');
}

function moveEx(pk,idx,dir){
  const arr=plan[pk].exercises;const ni=idx+dir;
  if(ni<0||ni>=arr.length)return;
  [arr[idx],arr[ni]]=[arr[ni],arr[idx]];
  LS.set('plan',plan);renderPlanList();
}

function openAddExercise(){
  document.getElementById('add-target-plan').textContent=currentPlanTab.replace('_',' ');
  document.getElementById('add-name').value='';
  document.getElementById('add-note').value='';
  openModal('modal-add-ex');
}

function confirmAddExercise(){
  const n=document.getElementById('add-name').value.trim();
  if(!n){toast('Name eingeben!');return;}
  const ex={
    id:Date.now(),name:n,
    sets:parseInt(document.getElementById('add-sets').value)||3,
    rmin:parseInt(document.getElementById('add-rmin').value)||8,
    rmax:parseInt(document.getElementById('add-rmax').value)||12,
    rir:parseInt(document.getElementById('add-rir').value),
    note:document.getElementById('add-note').value.trim(),
    type:document.getElementById('add-type').value,
    muscle:document.getElementById('add-muscle').value
  };
  if(ex.type!=='main')ex.rir=null;
  plan[currentPlanTab].exercises.push(ex);
  LS.set('plan',plan);closeModal('modal-add-ex');renderPlanList();toast('Übung hinzugefügt!');
}

function editExercise(pk,idx){
  const ex=plan[pk].exercises[idx];
  document.getElementById('add-name').value=ex.name;
  document.getElementById('add-sets').value=ex.sets;
  document.getElementById('add-rmin').value=ex.rmin;
  document.getElementById('add-rmax').value=ex.rmax;
  document.getElementById('add-rir').value=ex.rir||0;
  document.getElementById('add-note').value=ex.note||'';
  document.getElementById('add-type').value=ex.type;
  document.getElementById('add-muscle').value=ex.muscle;
  document.getElementById('add-target-plan').textContent=pk.replace('_',' ')+' (Edit)';
  // Replace confirm handler
  const btn=document.querySelector('#modal-add-ex .btn');
  btn.textContent='✓ SPEICHERN';
  btn.onclick=()=>{
    ex.name=document.getElementById('add-name').value.trim();
    ex.sets=parseInt(document.getElementById('add-sets').value)||3;
    ex.rmin=parseInt(document.getElementById('add-rmin').value)||8;
    ex.rmax=parseInt(document.getElementById('add-rmax').value)||12;
    ex.rir=document.getElementById('add-type').value==='main'?parseInt(document.getElementById('add-rir').value):null;
    ex.note=document.getElementById('add-note').value.trim();
    ex.type=document.getElementById('add-type').value;
    ex.muscle=document.getElementById('add-muscle').value;
    LS.set('plan',plan);closeModal('modal-add-ex');renderPlanList();toast('Gespeichert!');
    btn.textContent='+ HINZUFÜGEN';btn.onclick=confirmAddExercise;
  };
  openModal('modal-add-ex');
}

// ===== ACTIVE WORKOUT =====
function startWorkout(planKey){
  if(active){go('wo');renderWorkout();return;}
  if(!planKey){
    // Show picker
    let html='';
    Object.keys(plan).forEach(k=>{
      html+=`<button class="btn btn-ghost" style="margin-bottom:8px" onclick="closeModal('modal-pick-plan');startWorkout('${k}')">${k.replace('_',' ')} — ${plan[k].day}</button>`;
    });
    document.getElementById('pick-plan-list').innerHTML=html;
    openModal('modal-pick-plan');return;
  }
  const p=plan[planKey];
  active={planKey,startTime:Date.now(),exercises:p.exercises.map(ex=>({...ex,logged:[]}))};
  LS.set('active',active);go('wo');renderWorkout();toast('Let\'s go! 🔥');
}

function renderWorkout(){
  const c=document.getElementById('wo-content');
  const endBtn=document.getElementById('wo-end-btn');
  if(!active){
    endBtn.style.display='none';
    c.innerHTML=`<div class="empty">Kein aktives Workout.<br><br><button class="btn" onclick="startWorkout()">▶ WORKOUT STARTEN</button></div>`;
    return;
  }
  endBtn.style.display='';
  const elapsed=Math.floor((Date.now()-active.startTime)/1000);
  const mm=Math.floor(elapsed/60);
  let html=`<div class="wo-header"><div class="wo-plan">${active.planKey.replace('_',' ')}</div><div class="wo-time">⏱ ${mm} min</div></div>`;

  // Timer
  html+=`<div class="timer-wrap" id="timer-area">
    <div class="timer-circle${timerInterval?' running':''}${timerSeconds<=0&&timerTarget>0?' done':''}" id="timer-circle">
      <div class="timer-val" id="timer-display">${formatTimer(Math.max(0,timerTarget-timerSeconds))}</div>
      <div class="timer-label">Pause</div>
    </div>
    <div class="timer-btns">
      <button class="timer-btn timer-start" onclick="startTimer()">${timerInterval?'⏸ Pause':'▶ Start'}</button>
      <button class="timer-btn timer-skip" onclick="resetTimer()">⏭ Skip</button>
    </div>
    <div class="timer-adj"><span onclick="adjTimer(-15)">-15s</span><span onclick="adjTimer(15)">+15s</span><span onclick="adjTimer(30)">+30s</span></div>
  </div>`;

  active.exercises.forEach((ex,ei)=>{
    const ico=ex.type==='pre'?'🔥':ex.type==='mob'?'🧘':EMO[ex.muscle]||'💪';
    const reps=ex.rmin===ex.rmax?ex.rmin:ex.rmin+'–'+ex.rmax;
    const allDone=ex.logged.length>=ex.sets;
    const last=getLastWeight(ex.name);

    html+=`<div class="wo-ex-card" style="${allDone?'opacity:.5':''}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:20px">${ico}</span>
        <div><div class="wo-ex-name">${ex.name}</div><div class="wo-ex-target">${ex.sets}×${reps}${ex.rir!==null?' @ RIR '+ex.rir:''}</div></div>
        ${allDone?'<span style="margin-left:auto;color:var(--green);font-size:18px">✓</span>':''}
      </div>
      ${last?`<div style="font-size:11px;color:var(--text2);margin-bottom:8px">📊 Letztes Mal: <b style="color:var(--text);font-family:JetBrains Mono,monospace">${last}</b></div>`:''}
      <div class="wo-sets-log">`;

    for(let si=0;si<ex.sets;si++){
      const s=ex.logged[si];
      if(s){
        const rc=s.rir<=0?'r0':s.rir===1?'r1':s.rir<=2?'r2':'r3';
        html+=`<div class="wo-set-row"><div class="wo-set-num done">S${si+1}</div><div class="wo-set-vals">${s.w}kg × ${s.r}</div><div class="wo-set-rir ${rc}">RIR ${s.rir}</div></div>`;
      } else {
        html+=`<div class="wo-set-row"><div class="wo-set-num">S${si+1}</div><div class="wo-set-vals" style="color:var(--text3)">—</div></div>`;
      }
    }

    html+=`</div>`;
    if(!allDone){
      html+=`<button class="btn" onclick="openLogModal(${ei})">SATZ ${ex.logged.length+1} LOGGEN</button>`;
    }
    html+=`</div>`;
  });

  c.innerHTML=html;
}

function openLogModal(exIdx){
  logTarget={exIdx};
  const ex=active.exercises[exIdx];
  document.getElementById('log-ex-name').textContent=ex.name+' — Satz '+(ex.logged.length+1)+'/'+ex.sets;
  // Pre-fill with last values
  const lastSet=ex.logged.length>0?ex.logged[ex.logged.length-1]:null;
  const lastHist=getLastWeightObj(ex.name);
  if(lastSet){
    document.getElementById('log-w').value=lastSet.w;
    document.getElementById('log-r').value=lastSet.r;
    document.getElementById('log-rir').value=lastSet.rir;
  }else if(lastHist){
    document.getElementById('log-w').value=lastHist.w;
    document.getElementById('log-r').value=lastHist.r;
    document.getElementById('log-rir').value=lastHist.rir;
  }else{
    document.getElementById('log-w').value='';
    document.getElementById('log-r').value='';
    document.getElementById('log-rir').value=ex.rir||2;
  }
  document.getElementById('log-note').value='';
  openModal('modal-log');
  setTimeout(()=>document.getElementById('log-w').focus(),200);
}

function getLastWeightObj(exName){
  for(let i=history.length-1;i>=0;i--){
    const found=history[i].sets.filter(s=>s.ex===exName&&s.w>0);
    if(found.length)return found[found.length-1];
  }
  return null;
}

function confirmLog(){
  if(!logTarget||!active)return;
  const ex=active.exercises[logTarget.exIdx];
  const w=parseFloat(document.getElementById('log-w').value)||0;
  const r=parseInt(document.getElementById('log-r').value)||0;
  const rir=parseInt(document.getElementById('log-rir').value)||0;
  const note=document.getElementById('log-note').value.trim();
  ex.logged.push({w,r,rir,note});
  LS.set('active',active);
  closeModal('modal-log');

  // Auto-start timer
  const isCompound=ex.type==='main'&&['chest','back','legs'].includes(ex.muscle);
  timerTarget=isCompound?settings.compound:settings.isolation;
  timerSeconds=0;
  startTimer();

  renderWorkout();
  toast(`✓ ${w}kg × ${r} @ RIR ${rir}`);
}

function endWorkout(){
  if(!active)return;
  if(!confirm('Workout beenden und speichern?'))return;
  const session={
    date:new Date().toLocaleDateString('de-DE'),
    planKey:active.planKey,
    duration:Math.floor((Date.now()-active.startTime)/60000),
    sets:[]
  };
  active.exercises.forEach(ex=>{
    ex.logged.forEach((s,i)=>{
      session.sets.push({ex:ex.name,nr:i+1,w:s.w,r:s.r,rir:s.rir,note:s.note});
    });
  });
  if(session.sets.length>0){
    history.push(session);
    LS.set('history',history);
  }
  active=null;LS.set('active',null);
  resetTimer();renderWorkout();
  toast('Workout gespeichert! 💪');
}

// ===== TIMER =====
function formatTimer(s){const m=Math.floor(s/60);const sec=s%60;return m+':'+(sec<10?'0':'')+sec}

function startTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;renderWorkout();return;}
  if(timerTarget<=0)timerTarget=settings.compound;
  timerInterval=setInterval(()=>{
    timerSeconds++;
    const remaining=Math.max(0,timerTarget-timerSeconds);
    const d=document.getElementById('timer-display');
    const c=document.getElementById('timer-circle');
    if(d)d.textContent=formatTimer(remaining);
    if(remaining<=0){
      clearInterval(timerInterval);timerInterval=null;
      if(c){c.classList.remove('running');c.classList.add('done');}
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      toast('⏰ Pause vorbei!');
    }
  },1000);
  renderWorkout();
}

function resetTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  timerSeconds=0;timerTarget=0;
  renderWorkout();
}

function adjTimer(s){
  timerTarget=Math.max(0,timerTarget+s);
  renderWorkout();
}

// ===== HISTORY =====
function renderHist(){
  document.getElementById('h-count').textContent=history.length+' Sessions';
  const c=document.getElementById('hist-list');
  if(!history.length){c.innerHTML='<div class="empty">Noch keine Workouts geloggt.</div>';return;}
  let html='';
  [...history].reverse().forEach((s,si)=>{
    html+=`<div class="hist-session"><div class="hist-hdr"><div class="hist-date">${s.date}</div><div style="display:flex;gap:6px;align-items:center"><div class="hist-tag">${(s.planKey||'').replace('_',' ')}</div>${s.duration?`<span style="font-size:11px;color:var(--text2)">${s.duration}min</span>`:''}<button style="background:none;border:none;color:var(--red);font-size:14px;cursor:pointer" onclick="deleteSession(${history.length-1-si})">🗑️</button></div></div>`;
    s.sets.forEach(set=>{
      const rc=set.rir<=0?'r0':set.rir===1?'r1':set.rir<=2?'r2':'r3';
      html+=`<div class="hist-row"><div class="sn">S${set.nr}</div><div class="se">${set.ex}</div><div class="sw">${set.w}kg</div><div class="sr">×${set.r}</div><div class="wo-set-rir ${rc}" style="font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600">RIR${set.rir}</div></div>`;
    });
    html+=`</div>`;
  });
  c.innerHTML=html;
}

function deleteSession(idx){
  if(!confirm('Session löschen?'))return;
  history.splice(idx,1);LS.set('history',history);renderHist();toast('Gelöscht');
}

// ===== SETTINGS =====
function renderSettings(){
  document.getElementById('set-compound').value=settings.compound;
  document.getElementById('set-isolation').value=settings.isolation;
}
function saveSetting(k,v){settings[k]=parseInt(v)||0;LS.set('settings',settings)}

function exportData(){
  const data=JSON.stringify({plan,history,settings,active},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='pumpbrah_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();toast('Export gespeichert!');
}

function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(ev){
    try{
      const d=JSON.parse(ev.target.result);
      if(d.plan)plan=d.plan;
      if(d.history)history=d.history;
      if(d.settings)settings=d.settings;
      if(d.active!==undefined)active=d.active;
      LS.set('plan',plan);LS.set('history',history);LS.set('settings',settings);LS.set('active',active);
      toast('Import erfolgreich!');renderDash();
    }catch{toast('Fehler beim Import!')}
  };
  r.readAsText(f);
}

// ===== INIT =====
renderDash();
</script>
